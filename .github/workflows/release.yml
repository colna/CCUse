name: Release

# 触发：main 分支推送
# 行为：
#   1. 读取 apps/desktop/src-tauri/tauri.conf.json 的 version
#   2. 若该版本对应的 GitHub Release 不存在 —— 确保 tag 存在、构建三平台产物、发布 GitHub Release
#   3. 若 Release 已存在 —— 跳过（说明本次 push 没有版本变更）
#
# 产物（每次发布固定 3 个）：
#   - CCUse_<version>_aarch64.dmg          (macOS Apple Silicon)
#   - CCUse_<version>_x64.dmg              (macOS Intel)
#   - CCUse_<version>_x64-setup.exe        (Windows NSIS)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  # -------------------------------------------------------------------
  # 1) 读取版本号 + 判断 tag 是否已存在
  # -------------------------------------------------------------------
  check-version:
    name: Check version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.read.outputs.version }}
      tag: v${{ steps.read.outputs.version }}
      tag_exists: ${{ steps.check.outputs.tag_exists }}
      release_exists: ${{ steps.check.outputs.release_exists }}
      missing_macos_aarch64: ${{ steps.check.outputs.missing_macos_aarch64 }}
      missing_macos_x64: ${{ steps.check.outputs.missing_macos_x64 }}
      missing_windows_x64: ${{ steps.check.outputs.missing_windows_x64 }}
      is_prerelease: ${{ steps.read.outputs.is_prerelease }}
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from tauri.conf.json
        id: read
        run: |
          VERSION=$(jq -r '.version' apps/desktop/src-tauri/tauri.conf.json)
          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "::error::version not found in apps/desktop/src-tauri/tauri.conf.json"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

          # 0.x.y → pre-release；其余（含 1.0.0+）→ 正式 release
          MAJOR="${VERSION%%.*}"
          if [ "$MAJOR" = "0" ]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi
          # 0.0.0 是占位版本，不发任何 release
          if [ "$VERSION" = "0.0.0" ]; then
            echo "::notice::version is 0.0.0 (placeholder) — release will be skipped by check-version step"
          fi

      - name: Check if release already exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.read.outputs.version }}"
          TAG="v$VERSION"
          # 0.0.0 是仓库初始占位版本，不发布任何 release
          if [ "$VERSION" = "0.0.0" ]; then
            echo "Version is 0.0.0 — skip release."
            echo "tag_exists=false" >> "$GITHUB_OUTPUT"
            echo "release_exists=false" >> "$GITHUB_OUTPUT"
            echo "missing_macos_aarch64=false" >> "$GITHUB_OUTPUT"
            echo "missing_macos_x64=false" >> "$GITHUB_OUTPUT"
            echo "missing_windows_x64=false" >> "$GITHUB_OUTPUT"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "Tag $TAG already exists."
            echo "tag_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "Tag $TAG not found — will create it before release."
            echo "tag_exists=false" >> "$GITHUB_OUTPUT"
          fi
          missing_macos_aarch64=true
          missing_macos_x64=true
          missing_windows_x64=true
          MACOS_AARCH64_ASSET="CCUse_${VERSION}_aarch64.dmg"
          MACOS_X64_ASSET="CCUse_${VERSION}_x64.dmg"
          WINDOWS_X64_ASSET="CCUse_${VERSION}_x64-setup.exe"
          if RELEASE_JSON=$(gh release view "$TAG" --json assets 2>/dev/null); then
            echo "Release $TAG already exists — checking required assets."
            echo "release_exists=true" >> "$GITHUB_OUTPUT"
            if jq -e --arg asset "$MACOS_AARCH64_ASSET" '.assets | any(.name == $asset)' <<< "$RELEASE_JSON" >/dev/null; then
              missing_macos_aarch64=false
            fi
            if jq -e --arg asset "$MACOS_X64_ASSET" '.assets | any(.name == $asset)' <<< "$RELEASE_JSON" >/dev/null; then
              missing_macos_x64=false
            fi
            if jq -e --arg asset "$WINDOWS_X64_ASSET" '.assets | any(.name == $asset)' <<< "$RELEASE_JSON" >/dev/null; then
              missing_windows_x64=false
            fi
          else
            echo "Release $TAG not found — will build and publish."
            echo "release_exists=false" >> "$GITHUB_OUTPUT"
          fi
          echo "missing_macos_aarch64=$missing_macos_aarch64" >> "$GITHUB_OUTPUT"
          echo "missing_macos_x64=$missing_macos_x64" >> "$GITHUB_OUTPUT"
          echo "missing_windows_x64=$missing_windows_x64" >> "$GITHUB_OUTPUT"
          if [ "$missing_macos_aarch64" = "true" ] || [ "$missing_macos_x64" = "true" ] || [ "$missing_windows_x64" = "true" ]; then
            echo "Release $TAG is missing at least one required asset — will build missing assets."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "Release $TAG already has all required assets — skip release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          fi

  # -------------------------------------------------------------------
  # 2) 创建 tag（仅在需要发布时）
  # -------------------------------------------------------------------
  create-tag:
    name: Create tag
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true' && needs.check-version.outputs.tag_exists != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create and push tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ needs.check-version.outputs.tag }}" -m "Release ${{ needs.check-version.outputs.tag }}"
          git push origin "${{ needs.check-version.outputs.tag }}"

  # -------------------------------------------------------------------
  # 3) 三平台构建并上传到同一个 Release
  # -------------------------------------------------------------------
  build:
    name: Build ${{ matrix.label }}
    needs: [check-version, create-tag]
    if: always() && needs.check-version.outputs.should_release == 'true' && (needs.create-tag.result == 'success' || needs.create-tag.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS (Apple Silicon)
            asset_key: macos_aarch64
            platform: macos-latest
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin --bundles dmg
          - label: macOS (Intel)
            asset_key: macos_x64
            platform: macos-latest
            target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin --bundles dmg
          - label: Windows (x64)
            asset_key: windows_x64
            platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: --bundles nsis
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      # Linux 才需要的 GTK / WebKit 依赖此处用不上（matrix 不含 linux）

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Select missing asset
        id: asset
        shell: bash
        run: |
          case "${{ matrix.asset_key }}" in
            macos_aarch64)
              echo "should_build=${{ needs.check-version.outputs.missing_macos_aarch64 }}" >> "$GITHUB_OUTPUT"
              ;;
            macos_x64)
              echo "should_build=${{ needs.check-version.outputs.missing_macos_x64 }}" >> "$GITHUB_OUTPUT"
              ;;
            windows_x64)
              echo "should_build=${{ needs.check-version.outputs.missing_windows_x64 }}" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "::error::unknown asset key ${{ matrix.asset_key }}"
              exit 1
              ;;
          esac

      - name: Build & upload unsigned to Release
        if: steps.asset.outputs.should_build == 'true' && (((matrix.asset_key == 'macos_aarch64' || matrix.asset_key == 'macos_x64') && vars.CCUSE_APPLE_SIGNING_ENABLED != 'true') || (matrix.asset_key == 'windows_x64' && vars.CCUSE_WINDOWS_SIGNING_ENABLED != 'true'))
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ needs.check-version.outputs.tag }}
          releaseName: CCUse ${{ needs.check-version.outputs.tag }}
          releaseBody: |
            ## CCUse ${{ needs.check-version.outputs.tag }}

            ### 下载
            - **macOS (Apple Silicon)** — `*_aarch64.dmg`
            - **macOS (Intel)** — `*_x64.dmg`
            - **Windows** — `*_x64-setup.exe`

            自动由 GitHub Actions 构建发布。
          releaseDraft: false
          # 0.x.y → pre-release；1.0.0 起转为正式 release
          prerelease: ${{ needs.check-version.outputs.is_prerelease == 'true' }}
          projectPath: apps/desktop
          args: ${{ matrix.args }}

      - name: Build & upload signed macOS to Release
        if: steps.asset.outputs.should_build == 'true' && (matrix.asset_key == 'macos_aarch64' || matrix.asset_key == 'macos_x64') && vars.CCUSE_APPLE_SIGNING_ENABLED == 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # ---- macOS 公证 / 签名（显式启用时才注入，避免空变量触发 security import）----
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # ---- Tauri Updater 签名（可选）----
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ needs.check-version.outputs.tag }}
          releaseName: CCUse ${{ needs.check-version.outputs.tag }}
          releaseBody: |
            ## CCUse ${{ needs.check-version.outputs.tag }}

            ### 下载
            - **macOS (Apple Silicon)** — `*_aarch64.dmg`
            - **macOS (Intel)** — `*_x64.dmg`
            - **Windows** — `*_x64-setup.exe`

            自动由 GitHub Actions 构建发布。
          releaseDraft: false
          # 0.x.y → pre-release；1.0.0 起转为正式 release
          prerelease: ${{ needs.check-version.outputs.is_prerelease == 'true' }}
          projectPath: apps/desktop
          args: ${{ matrix.args }}

      - name: Build & upload signed Windows to Release
        if: steps.asset.outputs.should_build == 'true' && matrix.asset_key == 'windows_x64' && vars.CCUSE_WINDOWS_SIGNING_ENABLED == 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # ---- Windows 代码签名（显式启用时才注入）----
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          # ---- Tauri Updater 签名（可选）----
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ needs.check-version.outputs.tag }}
          releaseName: CCUse ${{ needs.check-version.outputs.tag }}
          releaseBody: |
            ## CCUse ${{ needs.check-version.outputs.tag }}

            ### 下载
            - **macOS (Apple Silicon)** — `*_aarch64.dmg`
            - **macOS (Intel)** — `*_x64.dmg`
            - **Windows** — `*_x64-setup.exe`

            自动由 GitHub Actions 构建发布。
          releaseDraft: false
          # 0.x.y → pre-release；1.0.0 起转为正式 release
          prerelease: ${{ needs.check-version.outputs.is_prerelease == 'true' }}
          projectPath: apps/desktop
          args: ${{ matrix.args }}
