name: Desktop Tauri E2E

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/desktop-e2e.yml"
      - "apps/desktop/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
  pull_request:
    paths:
      - ".github/workflows/desktop-e2e.yml"
      - "apps/desktop/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tauri-e2e:
    name: Tauri WebDriver (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            app_path: apps/desktop/src-tauri/target/debug/ccuse-desktop
            run_command: xvfb-run -a pnpm --filter @ccuse/desktop e2e:tauri
          - os: windows-latest
            app_path: apps/desktop/src-tauri/target/debug/ccuse-desktop.exe
            run_command: pnpm --filter @ccuse/desktop e2e:tauri

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            webkit2gtk-driver \
            wget \
            xvfb

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Install tauri-driver
        run: cargo install tauri-driver --locked

      - name: Verify Edge WebDriver
        if: runner.os == 'Windows'
        shell: pwsh
        run: where.exe msedgedriver

      - name: Build desktop app for WebDriver
        run: pnpm --filter @ccuse/desktop tauri build --debug --no-bundle --ci

      - name: Run Tauri WebDriver E2E
        env:
          CCUSE_TAURI_APP_PATH: ${{ github.workspace }}/${{ matrix.app_path }}
          CCUSE_TAURI_E2E: "1"
          WEBKIT_DISABLE_DMABUF_RENDERER: "1"
        run: ${{ matrix.run_command }}
